<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#090b12">
<meta name="description" content="Crie e administre campeonatos de futebol: mata-mata, pontos corridos e grupos.">
<title>Arena BDA — Criador de Campeonatos</title>
<style>
:root{
  --bg:#090b12;--panel:#111521;--panel2:#181e2d;--panel3:#20283a;--line:#2b3448;
  --text:#f4f1e8;--muted:#98a2b5;--gold:#d8a936;--gold2:#ffe39a;--red:#e05b56;
  --green:#4fc78b;--blue:#62a6ff;--shadow:0 20px 60px rgba(0,0,0,.34);
}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:
radial-gradient(circle at 50% -10%,rgba(216,169,54,.13),transparent 33%),
linear-gradient(180deg,#090b12,#0c1019 55%,#090b12);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}
button,input,select,textarea{font:inherit}button{cursor:pointer}a{color:inherit}.hidden{display:none!important}
.shell{max-width:1180px;margin:auto;padding:0 18px 80px}.topbar{position:sticky;top:0;z-index:30;margin:0 -18px;padding:12px 18px;background:rgba(9,11,18,.84);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.07)}
.topbar-inner{max-width:1180px;margin:auto;display:flex;align-items:center;gap:12px}.brand{display:flex;align-items:center;gap:11px;min-width:0}.brand-mark{width:42px;height:42px;display:grid;place-items:center;border-radius:14px;background:linear-gradient(145deg,#2b230f,#111521);border:1px solid rgba(216,169,54,.55);box-shadow:0 0 26px rgba(216,169,54,.13);font-size:23px}.brand-copy{min-width:0}.brand-copy b{display:block;letter-spacing:.08em}.brand-copy small{display:block;color:var(--muted);font-size:11px;margin-top:2px}.top-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:10px 14px;border-radius:12px;font-weight:750;transition:.18s;display:inline-flex;align-items:center;justify-content:center;gap:7px;text-decoration:none}.btn:hover{transform:translateY(-1px);border-color:#44506b}.btn:active{transform:scale(.97)}.btn.gold{border:0;background:linear-gradient(145deg,var(--gold2),var(--gold));color:#171207}.btn.ghost{background:transparent}.btn.danger{border-color:rgba(224,91,86,.42);color:#ffaaa6;background:rgba(224,91,86,.08)}.btn.small{padding:8px 10px;font-size:12px;border-radius:10px}.btn.icon{width:42px;padding:10px}.mobile-hide{display:inline-flex}
.hero{padding:44px 0 24px;display:grid;grid-template-columns:1.4fr .8fr;gap:20px;align-items:stretch}.hero-main,.hero-side{border:1px solid var(--line);border-radius:24px;background:linear-gradient(145deg,rgba(24,30,45,.95),rgba(14,18,29,.96));box-shadow:var(--shadow)}.hero-main{padding:32px;position:relative;overflow:hidden}.hero-main:after{content:"🏆";position:absolute;right:18px;bottom:-24px;font-size:150px;opacity:.055;transform:rotate(-8deg)}.eyebrow{color:var(--gold2);font-size:11px;font-weight:850;letter-spacing:.22em;text-transform:uppercase}.hero h1{font-size:clamp(31px,6vw,58px);line-height:.98;margin:12px 0 16px;max-width:760px;letter-spacing:-.045em}.hero p{color:var(--muted);max-width:660px;line-height:1.65;margin:0 0 22px}.hero-buttons{display:flex;flex-wrap:wrap;gap:10px}.hero-side{padding:24px;display:flex;flex-direction:column;justify-content:space-between}.hero-side h3{margin:0 0 8px}.hero-side p{font-size:13px}.legacy-link{margin-top:16px;padding:15px;border-radius:16px;background:rgba(216,169,54,.07);border:1px solid rgba(216,169,54,.24);text-decoration:none;display:block}.legacy-link b{display:block}.legacy-link small{color:var(--muted);display:block;margin-top:5px;line-height:1.4}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:4px 0 28px}.stat{padding:17px;border-radius:17px;border:1px solid var(--line);background:rgba(17,21,33,.8)}.stat strong{display:block;font-size:24px;color:var(--gold2)}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.11em;margin-top:4px}
.section-head{display:flex;gap:12px;align-items:end;margin:28px 0 13px}.section-head h2{margin:0;font-size:22px}.section-head p{margin:4px 0 0;color:var(--muted);font-size:13px}.section-head .right{margin-left:auto;display:flex;gap:8px}.tournament-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.t-card{border:1px solid var(--line);border-radius:19px;background:linear-gradient(160deg,var(--panel2),var(--panel));padding:18px;min-height:205px;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:.2s}.t-card:hover{transform:translateY(-3px);border-color:#46536f;box-shadow:0 18px 42px rgba(0,0,0,.24)}.t-card:before{content:"";position:absolute;inset:0 0 auto;height:3px;background:linear-gradient(90deg,var(--gold),transparent)}.t-card h3{font-size:18px;margin:11px 0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{color:var(--muted);font-size:12px;line-height:1.55}.pill-row{display:flex;gap:7px;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:rgba(255,255,255,.035);padding:5px 8px;border-radius:999px;font-size:10px;font-weight:750;color:#c9d0df}.pill.active{color:#8ff0bc;border-color:rgba(79,199,139,.32);background:rgba(79,199,139,.08)}.pill.finished{color:var(--gold2);border-color:rgba(216,169,54,.34);background:rgba(216,169,54,.08)}.progress{height:7px;background:#090c13;border:1px solid #252e40;border-radius:20px;overflow:hidden;margin:15px 0 7px}.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:inherit}.card-foot{margin-top:auto;display:flex;align-items:center;gap:8px}.card-foot .btn{flex:1}.empty{padding:38px 20px;text-align:center;border:1px dashed #34405a;border-radius:20px;background:rgba(17,21,33,.55);color:var(--muted)}.empty .emoji{font-size:44px;display:block;margin-bottom:10px}.empty h3{color:var(--text);margin:0 0 8px}
/* tournament screen */
.t-head{padding:28px 0 16px}.back{border:0;background:transparent;color:var(--muted);padding:8px 0;font-weight:750}.back:hover{color:var(--text)}.title-line{display:flex;align-items:flex-start;gap:14px;margin-top:10px}.title-line h1{margin:0;font-size:clamp(27px,5vw,45px);line-height:1.05}.title-line .actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.subtitle{color:var(--muted);font-size:13px;margin-top:8px}.tabs{display:flex;gap:7px;overflow:auto;padding:5px 0 14px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);color:var(--muted);padding:10px 14px;border-radius:12px;font-weight:750}.tab.on{color:#171207;border-color:transparent;background:linear-gradient(145deg,var(--gold2),var(--gold))}.view{padding-top:5px}.overview-grid{display:grid;grid-template-columns:1.3fr .7fr;gap:14px}.panel{border:1px solid var(--line);border-radius:19px;background:rgba(17,21,33,.86);padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.12)}.panel h3{margin:0 0 14px;font-size:16px}.panel-title{display:flex;align-items:center;gap:8px;margin-bottom:13px}.panel-title h3{margin:0}.panel-title .right{margin-left:auto}.mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.mini{padding:14px;border-radius:14px;background:var(--panel2);border:1px solid var(--line)}.mini b{font-size:22px;color:var(--gold2)}.mini span{display:block;color:var(--muted);font-size:11px;margin-top:4px}.notice{padding:13px 14px;border:1px solid rgba(98,166,255,.27);background:rgba(98,166,255,.07);border-radius:14px;color:#bdd7ff;font-size:12px;line-height:1.55;margin-bottom:12px}.notice.gold{border-color:rgba(216,169,54,.3);background:rgba(216,169,54,.07);color:#f3d98d}.champion{padding:22px;border:1px solid rgba(216,169,54,.44);background:radial-gradient(circle at 50% 0,rgba(216,169,54,.2),transparent 60%),var(--panel);border-radius:18px;text-align:center;margin-bottom:14px}.champion .cup{font-size:39px}.champion small{display:block;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;font-weight:800}.champion strong{display:block;font-size:23px;margin-top:7px;color:var(--gold2)}
.match-list{display:grid;gap:10px}.round-title{margin:20px 0 9px;color:var(--gold2);font-size:12px;text-transform:uppercase;letter-spacing:.16em}.match{border:1px solid var(--line);background:linear-gradient(160deg,var(--panel2),var(--panel));border-radius:16px;padding:12px;transition:.18s}.match:hover{border-color:#46536f}.match-top{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}.team-row{display:grid;grid-template-columns:34px minmax(0,1fr) auto;align-items:center;gap:9px;padding:7px 0}.team-row+.team-row{border-top:1px dashed #30394c}.badge{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:#293247;border:1px solid #46516a;color:white;font-weight:850;font-size:10px;overflow:hidden}.badge img{width:100%;height:100%;object-fit:cover}.team-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}.team-name.win{color:var(--gold2)}.score{min-width:40px;padding:5px 8px;border-radius:9px;background:#090c13;border:1px solid #303a50;text-align:center;font-weight:900;color:var(--gold2)}.match-bottom{display:flex;gap:6px;align-items:center;margin-top:9px;padding-top:9px;border-top:1px solid rgba(255,255,255,.055);color:var(--muted);font-size:11px}.match-bottom .btn{margin-left:auto}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px}.filters select,.filters input{width:auto;min-width:150px}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:15px}.standings{width:100%;border-collapse:collapse;min-width:620px;background:var(--panel)}.standings th,.standings td{padding:11px 10px;border-bottom:1px solid var(--line);text-align:center;font-size:12px}.standings th{position:sticky;top:0;background:#171c29;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em}.standings td.name{text-align:left;font-weight:750}.standings tr.qualify td:first-child{color:var(--green);font-weight:900}.standings tr:last-child td{border-bottom:0}
.team-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.team-card{display:flex;align-items:center;gap:11px;padding:13px;border:1px solid var(--line);border-radius:14px;background:var(--panel2)}.team-card .info{min-width:0}.team-card b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.team-card small{display:block;color:var(--muted);margin-top:3px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:grid;gap:6px}.field.full{grid-column:1/-1}.field label{font-size:11px;color:var(--muted);font-weight:750}.input{width:100%;border:1px solid var(--line);background:#0c1019;color:var(--text);border-radius:12px;padding:11px 12px;outline:none}.input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(216,169,54,.09)}textarea.input{resize:vertical;min-height:110px}.settings-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:16px}
/* modal */
.overlay{position:fixed;inset:0;z-index:80;background:rgba(2,4,8,.78);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center;padding:18px}.overlay.show{display:flex}.modal{width:min(620px,100%);max-height:min(90vh,850px);overflow:auto;background:linear-gradient(160deg,#1a2030,#10141f);border:1px solid #39445c;border-radius:24px;padding:20px;box-shadow:0 30px 100px rgba(0,0,0,.55)}.modal.wide{width:min(780px,100%)}.modal-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:17px}.modal-head h2{margin:0;font-size:21px}.modal-head p{margin:5px 0 0;color:var(--muted);font-size:12px}.modal-head .close{margin-left:auto;border:1px solid var(--line);background:var(--panel2);color:var(--text);width:38px;height:38px;border-radius:12px}.modal-foot{display:flex;gap:9px;justify-content:flex-end;margin-top:17px}.score-grid{display:grid;grid-template-columns:1fr 70px 70px 1fr;gap:8px;align-items:center}.score-grid .team-label{font-weight:800}.score-grid .team-label.right{text-align:right}.score-grid input{text-align:center;font-size:20px;font-weight:900;padding:10px 4px}.penalty-box{display:none;margin-top:12px;padding:13px;border:1px dashed rgba(216,169,54,.45);border-radius:14px;background:rgba(216,169,54,.05)}.penalty-box.show{display:block}.wo-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.wo{flex:1;border:1px solid var(--line);background:var(--panel2);color:var(--muted);padding:10px;border-radius:11px;font-weight:750}.wo.on{border-color:var(--red);background:rgba(224,91,86,.13);color:#ffaaa6}.toast{position:fixed;left:50%;bottom:24px;z-index:120;transform:translate(-50%,20px);opacity:0;background:#111827;border:1px solid #3a455e;color:white;padding:11px 15px;border-radius:12px;box-shadow:var(--shadow);transition:.22s;pointer-events:none;max-width:min(440px,calc(100% - 32px));text-align:center;font-size:13px}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:900px){.hero{grid-template-columns:1fr}.hero-side{display:block}.tournament-grid{grid-template-columns:repeat(2,1fr)}.overview-grid{grid-template-columns:1fr}.team-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.shell{padding-inline:12px}.topbar{margin-inline:-12px;padding-inline:12px}.brand-copy small{display:none}.mobile-hide{display:none!important}.hero{padding-top:24px}.hero-main{padding:23px 19px}.hero-main:after{font-size:100px}.stats{grid-template-columns:repeat(2,1fr)}.tournament-grid,.team-grid{grid-template-columns:1fr}.title-line{display:block}.title-line .actions{justify-content:flex-start;margin:14px 0 0}.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.score-grid{grid-template-columns:1fr 62px}.score-grid .team-label.right{text-align:left;grid-row:2}.modal{padding:17px;border-radius:20px}.overlay{padding:8px}.top-actions .btn.gold span{display:none}.section-head{align-items:center}.section-head p{display:none}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand"><div class="brand-mark">🏆</div><div class="brand-copy"><b>ARENA BDA</b><small>Central de campeonatos</small></div></div>
      <div class="top-actions">
        <a class="btn small ghost mobile-hide" href="index.html">🦅 Copa Grifo original</a>
        <button class="btn small" id="btnImport">📥 <span class="mobile-hide">Importar</span></button>
        <button class="btn gold small" id="btnNewTop">＋ <span>Novo campeonato</span></button>
      </div>
    </div>
  </header>
  <main id="app"></main>
</div>
<input id="importFile" type="file" accept="application/json" hidden>
<div class="overlay" id="createOverlay"><div class="modal wide">
  <div class="modal-head"><div><h2 id="createTitle">Novo campeonato</h2><p>Configure o formato e cole um time por linha.</p></div><button class="close" data-close="createOverlay">✕</button></div>
  <form id="createForm">
    <div class="form-grid">
      <div class="field"><label>Nome do campeonato</label><input class="input" id="fName" maxlength="60" required placeholder="Ex.: Copa Águia BDA"></div>
      <div class="field"><label>Organizador</label><input class="input" id="fOrganizer" maxlength="50" placeholder="Ex.: Clã BDA"></div>
      <div class="field"><label>Formato</label><select class="input" id="fFormat"><option value="KO">⚔️ Mata-mata</option><option value="LEAGUE1">📈 Pontos corridos — turno</option><option value="LEAGUE2">🔁 Pontos corridos — ida e volta</option><option value="GROUPS">🌍 Grupos + mata-mata</option></select></div>
      <div class="field hidden" id="groupCountField"><label>Número de grupos</label><select class="input" id="fGroups"><option value="2">2 grupos</option><option value="4">4 grupos</option><option value="8">8 grupos</option></select></div>
      <div class="field full"><label>Times, um por linha</label><textarea class="input" id="fTeams" required placeholder="São Paulo BDA&#10;Inter Brasil BDA&#10;CV Cruz BDA&#10;Imortais FC BDA"></textarea></div>
      <div class="field full"><label><input type="checkbox" id="fShuffle" checked> Sortear a ordem dos times ao criar</label></div>
    </div>
    <div class="notice gold" id="createHint">Mata-mata aceita de 2 a 32 times. Folgas são calculadas automaticamente.</div>
    <div class="modal-foot"><button type="button" class="btn" data-close="createOverlay">Cancelar</button><button type="submit" class="btn gold">Criar campeonato</button></div>
  </form>
</div></div>
<div class="overlay" id="matchOverlay"><div class="modal">
  <div class="modal-head"><div><h2 id="matchTitle">Editar partida</h2><p id="matchSub"></p></div><button class="close" data-close="matchOverlay">✕</button></div>
  <form id="matchForm">
    <input type="hidden" id="mId">
    <div class="score-grid"><div class="team-label" id="mTeamA"></div><input class="input" type="number" min="0" max="99" inputmode="numeric" id="mScoreA"><input class="input" type="number" min="0" max="99" inputmode="numeric" id="mScoreB"><div class="team-label right" id="mTeamB"></div></div>
    <div class="wo-row"><button type="button" class="wo" id="woA">W.O. para o time A</button><button type="button" class="wo" id="woB">W.O. para o time B</button><button type="button" class="wo" id="woNone">Sem W.O.</button></div>
    <div class="penalty-box" id="penaltyBox"><div class="field"><label>Desempate por pênaltis</label><div class="score-grid"><div class="team-label" id="pTeamA"></div><input class="input" type="number" min="0" max="99" inputmode="numeric" id="mPenA"><input class="input" type="number" min="0" max="99" inputmode="numeric" id="mPenB"><div class="team-label right" id="pTeamB"></div></div></div></div>
    <div class="form-grid" style="margin-top:14px"><div class="field"><label>Data</label><input class="input" type="date" id="mDate"></div><div class="field"><label>Horário</label><input class="input" type="time" id="mTime"></div><div class="field full"><label>Local</label><input class="input" id="mVenue" maxlength="80" placeholder="Ex.: Arena BDA"></div><div class="field full"><label>Observação</label><textarea class="input" id="mNotes" maxlength="300" style="min-height:70px" placeholder="Artilheiros, MVP ou informações da partida"></textarea></div></div>
    <div class="modal-foot"><button type="button" class="btn danger" id="clearMatch">Limpar resultado</button><button type="button" class="btn" data-close="matchOverlay">Cancelar</button><button type="submit" class="btn gold">Salvar</button></div>
  </form>
</div></div>
<div class="overlay" id="confirmOverlay"><div class="modal"><div class="modal-head"><div><h2 id="confirmTitle">Confirmar ação</h2><p id="confirmText"></p></div><button class="close" data-close="confirmOverlay">✕</button></div><div class="modal-foot"><button class="btn" data-close="confirmOverlay">Cancelar</button><button class="btn danger" id="confirmOk">Confirmar</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
const STORE='arena-bda-v1';
const APP_VERSION=1;
const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const uid=(p='id')=>p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8);
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const clone=o=>JSON.parse(JSON.stringify(o));
let state=loadState();let activeId=null;let activeTab='overview';let editingMatch=null;let confirmAction=null;let toastTimer=null;
function loadState(){try{const x=JSON.parse(localStorage.getItem(STORE));if(x&&x.version===APP_VERSION&&Array.isArray(x.tournaments))return x;}catch(e){}return{version:APP_VERSION,tournaments:[]};}
function save(){localStorage.setItem(STORE,JSON.stringify(state));}
function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2600);}
function shuffle(a){const x=a.slice();for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;}
function formatName(f){return({KO:'Mata-mata',LEAGUE1:'Pontos corridos',LEAGUE2:'Ida e volta',GROUPS:'Grupos + mata-mata'})[f]||f;}
function team(t,id){return t.teams.find(x=>x.id===id)||null;}
function initials(name){const a=String(name||'?').replace(/\bBDA\b/ig,'').trim().split(/\s+/).filter(Boolean);return (a.length>1?a[0][0]+a[1][0]:(a[0]||'?').slice(0,2)).toUpperCase();}
function badgeHtml(t,id){const x=team(t,id);if(!x)return'<span class="badge">?</span>';return x.badge?'<span class="badge"><img src="'+esc(x.badge)+'" alt=""></span>':'<span class="badge">'+esc(initials(x.name))+'</span>';}
function nextPow2(n){let p=1;while(p<n)p*=2;return p;}
function roundLabel(total,round){const remaining=total/Math.pow(2,round);if(remaining===2)return'Final';if(remaining===4)return'Semifinais';if(remaining===8)return'Quartas de final';if(remaining===16)return'Oitavas de final';return round===0?'Primeira fase':'Fase '+(round+1);}
function makeTeams(names){return names.map(name=>({id:uid('team'),name,badge:'',manager:''}));}
function blankMatch(extra={}){return Object.assign({id:uid('match'),stage:'',stageLabel:'',round:0,index:0,type:'fixed',teamA:null,teamB:null,seedA:null,seedB:null,sourceA:null,sourceB:null,scoreA:null,scoreB:null,penA:null,penB:null,wo:null,date:'',time:'',venue:'',notes:'',played:false},extra);}
function buildKO(teamIds,prefix='KO'){const ids=teamIds.slice();const size=nextPow2(ids.length);while(ids.length<size)ids.push(null);const matches=[];let prev=[];const rounds=Math.log2(size);for(let r=0;r<rounds;r++){const count=size/Math.pow(2,r+1);const current=[];for(let i=0;i<count;i++){const m=blankMatch({id:uid(prefix.toLowerCase()),stage:prefix,stageLabel:roundLabel(size,r),round:r,index:i,type:'ko'});if(r===0){m.seedA=ids[i*2]||null;m.seedB=ids[i*2+1]||null;}else{m.sourceA=prev[i*2].id;m.sourceB=prev[i*2+1].id;}matches.push(m);current.push(m);}prev=current;}return matches;}
function roundRobin(ids,doubleTurn=false,stage='LEAGUE',stageLabel='Liga',group=null){const a=ids.slice();if(a.length%2)a.push(null);const n=a.length,half=n/2,out=[];for(let r=0;r<n-1;r++){for(let i=0;i<half;i++){let A=a[i],B=a[n-1-i];if(A&&B){if(r%2)[A,B]=[B,A];out.push(blankMatch({stage,stageLabel,round:r,index:i,type:group?'group':'league',teamA:A,teamB:B,group}));}}a.splice(1,0,a.pop());}if(doubleTurn){const first=out.slice();first.forEach((m,k)=>out.push(blankMatch({stage,stageLabel,round:m.round+(n-1),index:m.index,type:m.type,teamA:m.teamB,teamB:m.teamA,group,leg:2})));}return out;}
function buildGroups(t,groupCount){const ids=t.teams.map(x=>x.id);const groups=Array.from({length:groupCount},(_,i)=>({id:String.fromCharCode(65+i),teams:[]}));ids.forEach((id,i)=>groups[i%groupCount].teams.push(id));t.groups=groups;t.matches=[];groups.forEach(g=>t.matches.push(...roundRobin(g.teams,false,'GROUP-'+g.id,'Grupo '+g.id,g.id)));t.groupSignature='';}

function resolveTeam(t,m,side,stack=new Set()){const direct=m['team'+side]||m['seed'+side];if(direct)return direct;const source=m['source'+side];if(!source||stack.has(source))return null;stack.add(source);return winnerOf(t,t.matches.find(x=>x.id===source),stack);}

function winnerOf(t,m,stack=new Set()){if(!m)return null;const A=resolveTeam(t,m,'A',stack),B=resolveTeam(t,m,'B',stack);if(A&&!B)return A;if(B&&!A)return B;if(!A||!B||!decided(t,m))return null;if(m.wo)return m.wo==='A'?A:B;if(m.scoreA>m.scoreB)return A;if(m.scoreB>m.scoreA)return B;if(m.penA>m.penB)return A;if(m.penB>m.penA)return B;return null;}
function matchesPlayed(t){return t.matches.filter(m=>decided(t,m)&&resolveTeam(t,m,'A')&&resolveTeam(t,m,'B'));}
function standings(t,ids,matches){const map={};ids.forEach(id=>map[id]={id,P:0,J:0,V:0,E:0,D:0,GP:0,GC:0,SG:0});matches.forEach(m=>{if(!decided(t,m))return;const A=resolveTeam(t,m,'A'),B=resolveTeam(t,m,'B');if(!map[A]||!map[B])return;const sa=scoreValue(m,'A'),sb=scoreValue(m,'B'),a=map[A],b=map[B];a.J++;b.J++;a.GP+=sa;a.GC+=sb;b.GP+=sb;b.GC+=sa;if(sa>sb){a.V++;b.D++;a.P+=3}else if(sb>sa){b.V++;a.D++;b.P+=3}else{a.E++;b.E++;a.P++;b.P++}});Object.values(map).forEach(x=>x.SG=x.GP-x.GC);return Object.values(map).sort((a,b)=>b.P-a.P||b.SG-a.SG||b.GP-a.GP||team(t,a.id).name.localeCompare(team(t,b.id).name));}
function leagueStandings(t){return standings(t,t.teams.map(x=>x.id),t.matches.filter(m=>m.type==='league'));}
function groupStandings(t,g){return standings(t,g.teams,t.matches.filter(m=>m.type==='group'&&m.group===g.id));}
function groupsComplete(t){return t.groups.length>0&&t.groups.every(g=>{const ms=t.matches.filter(m=>m.type==='group'&&m.group===g.id);return ms.length&&ms.every(m=>decided(t,m));});}
function syncGroupKO(t){if(t.format!=='GROUPS')return;const ko=t.matches.filter(m=>m.type==='ko');if(!groupsComplete(t)){if(ko.length&&!ko.some(m=>m.played||m.wo))t.matches=t.matches.filter(m=>m.type!=='ko');return;}const qualifiers=[];t.groups.forEach(g=>{const s=groupStandings(t,g);if(s[0])qualifiers.push(s[0].id);if(s[1])qualifiers.push(s[1].id);});const sig=qualifiers.join('|');if(!ko.length){t.matches.push(...buildKO(qualifiers,'PLAYOFF'));t.groupSignature=sig;}else if(t.groupSignature!==sig&&!ko.some(m=>m.played||m.wo)){t.matches=t.matches.filter(m=>m.type!=='ko');t.matches.push(...buildKO(qualifiers,'PLAYOFF'));t.groupSignature=sig;}}
function champion(t){syncGroupKO(t);if(t.format==='LEAGUE1'||t.format==='LEAGUE2'){if(!t.matches.length||!t.matches.every(m=>decided(t,m)))return null;const s=leagueStandings(t);return s[0]?.id||null;}const ko=t.matches.filter(m=>m.type==='ko');if(!ko.length)return null;const final=ko.slice().sort((a,b)=>b.round-a.round)[0];return winnerOf(t,final);}

function bracketHtml(t){const ko=t.matches.filter(m=>m.type==='ko');const rounds=[...new Set(ko.map(m=>m.round))];return rounds.map(r=>`<div class="round-title">${esc(ko.find(m=>m.round===r)?.stageLabel||'Fase')}</div><div class="match-list">${ko.filter(m=>m.round===r).map(m=>matchHtml(t,m)).join('')}</div>`).join('')||'<div class="empty"><span class="emoji">🌳</span><h3>Chaveamento indisponível</h3></div>';}
function renderTeams(t){$('#tView').innerHTML=`<div class="panel"><div class="panel-title"><h3>👥 Times participantes</h3><div class="right"><span class="pill">${t.teams.length} times</span></div></div><div class="team-grid">${t.teams.map((x,i)=>`<div class="team-card">${badgeHtml(t,x.id)}<div class="info"><b>${esc(x.name)}</b><small>${x.manager?esc(x.manager):'Participante '+(i+1)}</small></div></div>`).join('')}</div><div class="notice gold" style="margin-top:14px">Para trocar a lista de times, use Configurações. A estrutura será recriada e os resultados atuais serão apagados.</div></div>`;}
function renderSettings(t){$('#tView').innerHTML=`<div class="overview-grid"><div class="panel"><h3>⚙️ Dados do campeonato</h3><form id="settingsForm"><div class="form-grid"><div class="field"><label>Nome</label><input class="input" id="sName" value="${esc(t.name)}" maxlength="60"></div><div class="field"><label>Organizador</label><input class="input" id="sOrganizer" value="${esc(t.organizer)}" maxlength="50"></div><div class="field full"><label>Formato atual</label><input class="input" value="${esc(formatName(t.format))}" disabled></div></div><div class="settings-actions"><button class="btn gold" type="submit">Salvar alterações</button></div></form></div><aside><div class="panel"><h3>Ferramentas</h3><div style="display:grid;gap:8px"><button class="btn" id="setDuplicate">⧉ Duplicar campeonato</button><button class="btn" id="setExport">⬇️ Exportar JSON</button><button class="btn" id="setReset">↺ Recriar campeonato</button><button class="btn danger" id="setDelete">🗑️ Excluir campeonato</button></div></div></aside></div>`;$('#settingsForm').onsubmit=e=>{e.preventDefault();t.name=$('#sName').value.trim()||t.name;t.organizer=$('#sOrganizer').value.trim()||'Clã BDA';updateTournament(t);toast('Alterações salvas');renderTournament(t)};$('#setDuplicate').onclick=()=>duplicateTournament(t);$('#setExport').onclick=()=>exportTournament(t);$('#setReset').onclick=()=>confirmBox('Recriar campeonato','Todos os resultados, datas e observações serão apagados. Os times e o formato serão mantidos.',()=>{buildStructure(t);updateTournament(t);toast('Campeonato recriado');activeTab='overview';renderTournament(t)});$('#setDelete').onclick=()=>deleteTournament(t);}
function openCreate(){const ov=$('#createOverlay');$('#createForm').reset();$('#fShuffle').checked=true;$('#fOrganizer').value='Clã BDA';updateCreateFormat();ov.classList.add('show');setTimeout(()=>$('#fName').focus(),80);}
function updateCreateFormat(){const f=$('#fFormat').value;$('#groupCountField').classList.toggle('hidden',f!=='GROUPS');const hints={KO:'Mata-mata aceita de 2 a 32 times. Folgas são calculadas automaticamente.',LEAGUE1:'Pontos corridos aceita de 2 a 24 times e gera um turno completo.',LEAGUE2:'Ida e volta aceita de 2 a 20 times e gera dois turnos.',GROUPS:'Grupos aceita de 4 a 32 times. Os dois melhores de cada grupo avançam.'};$('#createHint').textContent=hints[f];}
$('#fFormat').onchange=updateCreateFormat;
$('#createForm').onsubmit=e=>{e.preventDefault();const name=$('#fName').value.trim(),format=$('#fFormat').value,names=[...new Set($('#fTeams').value.split(/\n/).map(x=>x.trim()).filter(Boolean))],groupCount=Number($('#fGroups').value||2);let max=format==='LEAGUE2'?20:format==='LEAGUE1'?24:32;if(names.length<2)return toast('Adicione pelo menos 2 times');if(names.length>max)return toast('Este formato aceita no máximo '+max+' times');if(format==='GROUPS'&&(names.length<groupCount*2||names.length%groupCount!==0))return toast('Use uma quantidade divisível por '+groupCount+' e no mínimo 2 times por grupo');const t=createTournament({name,organizer:$('#fOrganizer').value.trim(),format,names,groupCount,shuffle:$('#fShuffle').checked});closeOverlay('createOverlay');activeId=t.id;activeTab='overview';toast('Campeonato criado 🏆');render();};
function openMatch(t,id){const m=t.matches.find(x=>x.id===id);if(!m)return;const A=resolveTeam(t,m,'A'),B=resolveTeam(t,m,'B');if(!A||!B)return;editingMatch={t,id};$('#mId').value=id;$('#matchTitle').textContent='Editar partida';$('#matchSub').textContent=m.type==='group'?'Grupo '+m.group:m.type==='league'?'Rodada '+(m.round+1):m.stageLabel;$('#mTeamA').textContent=$('#pTeamA').textContent=team(t,A).name;$('#mTeamB').textContent=$('#pTeamB').textContent=team(t,B).name;$('#mScoreA').value=m.scoreA??'';$('#mScoreB').value=m.scoreB??'';$('#mPenA').value=m.penA??'';$('#mPenB').value=m.penB??'';$('#mDate').value=m.date||'';$('#mTime').value=m.time||'';$('#mVenue').value=m.venue||'';$('#mNotes').value=m.notes||'';setWo(m.wo);updatePenaltyBox(m);$('#matchOverlay').classList.add('show');}
function setWo(side){if(!editingMatch)return;const m=editingMatch.t.matches.find(x=>x.id===editingMatch.id);m.__tempWo=side;$('#woA').classList.toggle('on',side==='A');$('#woB').classList.toggle('on',side==='B');$('#woNone').classList.toggle('on',!side);}
function updatePenaltyBox(m){const tie=$('#mScoreA').value!==''&&$('#mScoreB').value!==''&&Number($('#mScoreA').value)===Number($('#mScoreB').value)&&m.type==='ko'&&!m.__tempWo;$('#penaltyBox').classList.toggle('show',tie);}
$('#woA').onclick=()=>setWo('A');$('#woB').onclick=()=>setWo('B');$('#woNone').onclick=()=>setWo(null);$('#mScoreA').oninput=$('#mScoreB').oninput=()=>{if(editingMatch)updatePenaltyBox(editingMatch.t.matches.find(x=>x.id===editingMatch.id))};
$('#matchForm').onsubmit=e=>{e.preventDefault();if(!editingMatch)return;const {t,id}=editingMatch,m=t.matches.find(x=>x.id===id),sa=$('#mScoreA').value,sb=$('#mScoreB').value,wo=m.__tempWo||null;m.wo=wo;m.scoreA=sa===''?null:Number(sa);m.scoreB=sb===''?null:Number(sb);m.penA=$('#mPenA').value===''?null:Number($('#mPenA').value);m.penB=$('#mPenB').value===''?null:Number($('#mPenB').value);m.date=$('#mDate').value;m.time=$('#mTime').value;m.venue=$('#mVenue').value.trim();m.notes=$('#mNotes').value.trim();if(wo){m.played=true;m.scoreA=wo==='A'?3:0;m.scoreB=wo==='B'?3:0;m.penA=m.penB=null}else if(m.scoreA!=null&&m.scoreB!=null){if(m.type==='ko'&&m.scoreA===m.scoreB&&(m.penA==null||m.penB==null||m.penA===m.penB))return toast('Informe um vencedor nos pênaltis');m.played=true}else m.played=false;delete m.__tempWo;updateTournament(t);closeOverlay('matchOverlay');toast('Partida salva');renderTournament(t);};
$('#clearMatch').onclick=()=>{if(!editingMatch)return;const {t,id}=editingMatch,m=t.matches.find(x=>x.id===id);Object.assign(m,{scoreA:null,scoreB:null,penA:null,penB:null,wo:null,played:false,notes:''});delete m.__tempWo;updateTournament(t);closeOverlay('matchOverlay');toast('Resultado removido');renderTournament(t);};
function duplicateTournament(t){const x=clone(t);x.id=uid('tournament');x.name=t.name+' — Cópia';x.createdAt=x.updatedAt=Date.now();x.teams.forEach(z=>z.id=uid('team'));const names=t.teams.map(z=>z.name);x.teams=makeTeams(names);buildStructure(x);state.tournaments.unshift(x);save();activeId=x.id;activeTab='overview';toast('Cópia criada');render();}
function deleteTournament(t){confirmBox('Excluir '+t.name+'?','Esta ação remove o campeonato e todos os resultados salvos neste navegador.',()=>{state.tournaments=state.tournaments.filter(x=>x.id!==t.id);save();activeId=null;toast('Campeonato excluído');render()});}
function openTournamentMenu(t){confirmBox(t.name,'Escolha confirmar para criar uma cópia limpa deste campeonato.',()=>duplicateTournament(t),'Duplicar');}
function confirmBox(title,text,fn,label='Confirmar'){confirmAction=fn;$('#confirmTitle').textContent=title;$('#confirmText').textContent=text;$('#confirmOk').textContent=label;$('#confirmOverlay').classList.add('show');}
$('#confirmOk').onclick=()=>{const fn=confirmAction;closeOverlay('confirmOverlay');confirmAction=null;if(fn)fn()};
function closeOverlay(id){$('#'+id).classList.remove('show');if(id==='matchOverlay'&&editingMatch){const m=editingMatch.t.matches.find(x=>x.id===editingMatch.id);if(m)delete m.__tempWo;editingMatch=null;}}
$$('[data-close]').forEach(b=>b.onclick=()=>closeOverlay(b.dataset.close));$$('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeOverlay(o.id)}));
function exportTournament(t){const data={arenaBDA:true,version:APP_VERSION,exportedAt:new Date().toISOString(),tournament:t};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=t.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500);}
function encodeShare(t){return btoa(unescape(encodeURIComponent(JSON.stringify({arenaBDA:true,version:APP_VERSION,tournament:t}))));}
async function shareTournament(t){const url=location.origin+location.pathname+'#arena='+encodeShare(t);const text=t.name+' — '+formatName(t.format);try{if(navigator.share){await navigator.share({title:t.name,text,url});return}await navigator.clipboard.writeText(url);toast('Link copiado para compartilhar')}catch(e){try{prompt('Copie o link:',url)}catch(_){} }}
function loadShared(){if(!location.hash.startsWith('#arena='))return false;try{const data=JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(7)))));if(!data.arenaBDA||!data.tournament)return false;const t=data.tournament;t.id=uid('tournament');t.name=t.name+' — Compartilhado';t.createdAt=t.updatedAt=Date.now();state.tournaments.unshift(t);save();activeId=t.id;history.replaceState(null,'',location.pathname+location.search);toast('Campeonato importado do link');return true}catch(e){return false}}
$('#importFile').onchange=async e=>{const f=e.target.files[0];e.target.value='';if(!f)return;try{const data=JSON.parse(await f.text()),t=data.tournament||data;if(!t||!Array.isArray(t.teams)||!Array.isArray(t.matches))throw Error();t.id=uid('tournament');t.name=(t.name||'Campeonato importado')+' — Importado';t.createdAt=t.updatedAt=Date.now();state.tournaments.unshift(t);save();activeId=t.id;activeTab='overview';toast('Campeonato importado');render()}catch(err){toast('Arquivo inválido')}};
$('#btnNewTop').onclick=openCreate;$('#btnImport').onclick=()=>$('#importFile').click();
window.addEventListener('keydown',e=>{if(e.key==='Escape')$$('.overlay.show').forEach(o=>closeOverlay(o.id))});
loadShared();render();
</script>
</body>
</html>
